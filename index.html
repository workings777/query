<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수주·매출 쿼리 생성기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <h1 class="app-header__title">수주·매출 쿼리 생성기</h1>
      <span class="app-header__meta">시디즈 · v1.0</span>
    </div>
  </header>

  <div class="app-layout">
    <aside class="panel panel--left">

      <!-- 고정 조건 -->
      <section class="card">
        <h2 class="card__title">고정 조건</h2>
        <div class="form-field">
          <label class="form-label">구분</label>
          <div class="radio-group" id="gubunGroup">
            <label class="radio"><input type="radio" name="gubun" value="both" checked><span>전체 (수주+매출)</span></label>
            <label class="radio"><input type="radio" name="gubun" value="수주"><span>수주</span></label>
            <label class="radio"><input type="radio" name="gubun" value="매출"><span>매출</span></label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">회사</label>
            <input type="text" value="시디즈" readonly class="input input--readonly">
          </div>
          <div class="form-field">
            <label class="form-label">브랜드</label>
            <input type="text" value="시디즈" readonly class="input input--readonly">
          </div>
        </div>
      </section>

      <!-- 기간 설정 -->
      <section class="card">
        <h2 class="card__title">기간 설정 <span class="badge-required">필수</span></h2>
        <div class="form-field">
          <label class="form-label">기간 유형</label>
          <div class="radio-group">
            <label class="radio"><input type="radio" name="dateType" value="주문일자" checked><span>주문일자</span></label>
            <label class="radio"><input type="radio" name="dateType" value="확정납기"><span>확정납기</span></label>
            <label class="radio"><input type="radio" name="dateType" value="매출일"><span>매출일</span></label>
          </div>
        </div>
        <div class="date-row">
          <div class="form-field">
            <label class="form-label">시작일</label>
            <input type="date" id="startDate" class="input">
          </div>
          <span class="date-sep">~</span>
          <div class="form-field">
            <label class="form-label">종료일</label>
            <input type="date" id="endDate" class="input">
          </div>
        </div>
        <p id="dateError" class="error-msg" hidden>종료일은 시작일 이후여야 합니다.</p>
      </section>

      <!-- 컬럼 조건 -->
      <section class="card">
        <h2 class="card__title">컬럼 조건</h2>
        <p class="card__desc">체크 시 해당 컬럼의 조건이 WHERE 절에 추가됩니다.</p>
        <div id="conditionList" class="condition-list"></div>
      </section>

    </aside>

    <main class="panel panel--right">
      <section class="card card--query">
        <div class="query-header">
          <div>
            <h2 class="card__title" style="margin-bottom:4px">SQL 미리보기</h2>
            <p class="card__desc" style="margin-bottom:0">조건 변경 시 실시간으로 갱신됩니다.</p>
          </div>
          <button id="copyBtn" class="btn btn--copy">복사</button>
        </div>
        <div class="query-block">
          <div class="query-line-numbers" id="lineNumbers"></div>
          <pre id="queryOutput" class="query-code">-- 기간 조건을 설정하면
-- 쿼리가 자동으로 생성됩니다.</pre>
        </div>
      </section>
    </main>
  </div>

  <footer class="action-bar">
    <div class="action-bar__inner">
      <button id="generateBtn" class="btn btn--primary">쿼리 생성</button>
      <button id="resetBtn" class="btn btn--ghost">초기화</button>
    </div>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
